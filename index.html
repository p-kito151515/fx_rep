<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>BTC水平線ドロワー</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;color:#f0f0f0;font-family:system-ui,-apple-system,sans-serif;padding:0.75rem;min-height:100vh;}
h1{font-size:17px;font-weight:500;margin-bottom:2px;}
.sub{font-size:12px;color:#666;margin-bottom:14px;}
.step{background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;margin-bottom:10px;}
.step-t{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.step-num{background:#333;color:#aaa;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.step-num.done{background:#4CAF50;color:#fff;}
.paste-area{width:100%;height:160px;background:#111;border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 10px;font-size:12px;color:#f0f0f0;font-family:monospace;resize:vertical;line-height:1.7;}
.btn-main{width:100%;background:#f0f0f0;color:#111;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:500;cursor:pointer;margin-top:10px;margin-bottom:8px;}
.btn-main:disabled{opacity:.3;cursor:not-allowed;}
.btn-sub{width:100%;background:transparent;border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px;font-size:13px;color:#555;cursor:pointer;margin-bottom:10px;}
.btn-dl{width:100%;background:transparent;border:0.5px solid rgba(255,255,255,0.2);border-radius:10px;padding:11px;font-size:13px;color:#aaa;cursor:pointer;margin-bottom:6px;}
.legend{background:#1a1a1a;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.leg-t{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.leg-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;font-size:12px;}
.leg-row:last-child{margin-bottom:0;}
.err{font-size:12px;color:#FF4444;background:rgba(255,68,68,0.1);border-radius:6px;padding:6px 10px;margin-top:6px;}
.ok-msg{font-size:12px;color:#4CAF50;margin-top:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const AC = ['#FF4444','#FF8C42','#FFD700','#4CAF50','#00BCD4','#9C27B0','#2196F3','#FF69B4','#00E676','#FF6B6B'];

const PICK_BTN = {
  flex:1, background:'#1a1a1a',
  border:'0.5px solid rgba(255,255,255,0.18)',
  borderRadius:8, padding:'10px 6px',
  fontSize:12, fontWeight:500, color:'#aaa',
  cursor:'pointer', textAlign:'center',
  position:'relative', display:'flex',
  alignItems:'center', justifyContent:'center', gap:5,
};

// ---- utilities ----
function p2y(p, pt, pb, ct, cb) { return ct + (pt - p) / (pt - pb) * (cb - ct); }
function s2w(s) {
  s = parseFloat(s);
  if (s >= 5) return 4; if (s >= 4.5) return 3;
  if (s >= 4) return 2.5; if (s >= 3.5) return 2;
  if (s >= 3) return 1.5; return 1;
}
function h2r(h) {
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}

function parseLines(raw) {
  const rows = raw.split('\n').map(l => l.trim()).filter(Boolean);
  let priceTop = null, priceBottom = null;
  const parsed = [];
  rows.forEach((line, li) => {
    const tM = line.match(/上端[：:]\s*([\d.]+)/);
    const bM = line.match(/下端[：:]\s*([\d.]+)/);
    if (tM) { priceTop = parseFloat(tM[1]); return; }
    if (bM) { priceBottom = parseFloat(bM[1]); return; }
    if (line.startsWith('#') || line.startsWith('//')) return;
    if (!line.includes('|')) return;
    const parts = line.split('|').map(p => p.trim());
    if (parts.length < 2) return;
    const price = parts[0];
    const score = parts[1] || '3.0';
    const name  = parts[2] || `ライン${li + 1}`;
    const color = parts[3] || AC[parsed.length % AC.length];
    if (!price) return;
    parsed.push({ price, score, name, color });
  });
  if (!parsed.length) return { error: '水平線データが見つかりません。形式を確認してください。' };
  return { lines: parsed, priceTop, priceBottom };
}

function drawLabel(ctx, txt, y, col, canvasW, LW) {
  const fs = 14, pd = 4, th = fs + 4;
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.font = `bold ${fs}px system-ui`;
  const tw = ctx.measureText(txt).width;
  const lx = canvasW - LW + 6;
  const ly = y - th / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(lx - pd, ly - pd, Math.min(tw + pd * 2, LW - 8), th + pd * 2);
  ctx.fillStyle = col;
  ctx.fillText(txt, lx, ly + th - 4);
  ctx.restore();
}

function renderToCanvas(imgEl, data, topPx, bottomPx) {
  const cv = document.createElement('canvas');
  cv.width  = imgEl.naturalWidth;
  cv.height = imgEl.naturalHeight;
  const ctx = cv.getContext('2d');
  ctx.drawImage(imgEl, 0, 0);

  const allP = [];
  data.lines.forEach(l =>
    l.price.split(',').forEach(p => { const v = parseFloat(p); if (!isNaN(v)) allP.push(v); })
  );
  const pt = data.priceTop  ?? (allP.length ? Math.max(...allP) * 1.01 : 75000);
  const pb = data.priceBottom ?? (allP.length ? Math.min(...allP) * 0.99 : 69000);
  const ct = topPx, cb = bottomPx;
  const w = cv.width, LW = 150;
  const legend = [];

  data.lines.forEach((l, i) => {
    const ps = l.price.split(',').map(p => parseFloat(p.trim())).filter(p => !isNaN(p));
    if (!ps.length) return;
    const col = l.color?.startsWith('#') ? l.color : AC[i % AC.length];
    const rgb = h2r(col);
    const lw  = s2w(l.score);
    const isZone = ps.length >= 2;

    if (isZone) {
      const y1 = p2y(Math.max(...ps), pt, pb, ct, cb);
      const y2 = p2y(Math.min(...ps), pt, pb, ct, cb);
      ctx.save();
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.13)`;
      ctx.fillRect(0, y1, w - LW, y2 - y1);
      ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.globalAlpha = 0.9; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(0, y1); ctx.lineTo(w - LW, y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(w - LW, y2); ctx.stroke();
      ctx.restore();
      drawLabel(ctx, `${l.name} (${l.price})`, (y1 + y2) / 2, col, w, LW);
      legend.push({ ...l, col, isZone: true });
    } else {
      const y = p2y(ps[0], pt, pb, ct, cb);
      ctx.save(); ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.globalAlpha = 0.9;
      if (parseFloat(l.score) <= 3) ctx.setLineDash([10, 6]);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w - LW, y); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
      drawLabel(ctx, `${l.name} ${l.price}`, y, col, w, LW);
      legend.push({ ...l, col, isZone: false });
    }
  });

  return { dataURL: cv.toDataURL('image/png'), legend };
}

// ---- Components ----

function StepCard({ num, title, done, children }) {
  return (
    <div className="step">
      <div className="step-t">
        <span className={`step-num${done ? ' done' : ''}`}>{done ? '✓' : num}</span>
        {title}
      </div>
      {children}
    </div>
  );
}

function DragLine({ label, color, bgColor, ratio, containerRef, onRatioChange }) {
  const elRef = useRef(null);

  const onPointerDown = (e) => {
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
    e.preventDefault();
  };

  const onPointerMove = (e) => {
    if (!e.currentTarget.hasPointerCapture(e.pointerId)) return;
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    onRatioChange(Math.max(0.01, Math.min(0.99, (e.clientY - rect.top) / rect.height)));
  };

  return (
    <div
      ref={elRef}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      style={{
        position:'absolute', top:`${ratio * 100}%`,
        left:0, right:0, height:44,
        transform:'translateY(-22px)',
        cursor:'ns-resize', zIndex:10, touchAction:'none',
        display:'flex', alignItems:'center',
      }}
    >
      <div style={{
        position:'absolute', left:0, right:0, top:'50%', height:2,
        background:color, boxShadow:`0 0 6px ${color}`,
        transform:'translateY(-1px)', pointerEvents:'none',
      }}/>
      <div style={{
        position:'absolute', left:6, top:'50%', transform:'translateY(-50%)',
        background:bgColor, color, fontSize:11, fontWeight:700,
        padding:'2px 8px', borderRadius:4, pointerEvents:'none', whiteSpace:'nowrap',
      }}>
        {label} ↕
      </div>
    </div>
  );
}

function CalibrationPanel({ imageDataURL, naturalHeight, onChange }) {
  const [topR, setTopR] = useState(0.18);
  const [botR, setBotR] = useState(0.90);
  const containerRef = useRef(null);

  useEffect(() => {
    onChange({
      topPx:    Math.round(topR * naturalHeight),
      bottomPx: Math.round(botR * naturalHeight),
    });
  }, [topR, botR, naturalHeight, onChange]);

  return (
    <div>
      <div style={{ fontSize:11, color:'#555', marginBottom:8, lineHeight:1.7 }}>
        <span style={{ color:'#4CAF50', fontWeight:600 }}>緑ライン</span> をチャートの上端（最高値）に、
        <span style={{ color:'#FF4444', fontWeight:600 }}>赤ライン</span> を下端（最安値）にドラッグして合わせてください。
      </div>
      <div ref={containerRef} style={{ position:'relative', width:'100%', userSelect:'none' }}>
        <img src={imageDataURL} style={{ width:'100%', display:'block', borderRadius:8 }} alt="chart"/>
        <DragLine
          label="上端" color="#4CAF50" bgColor="rgba(0,50,0,0.92)"
          ratio={topR} containerRef={containerRef} onRatioChange={setTopR}
        />
        <DragLine
          label="下端" color="#FF4444" bgColor="rgba(50,0,0,0.92)"
          ratio={botR} containerRef={containerRef} onRatioChange={setBotR}
        />
      </div>
    </div>
  );
}

// ---- App ----

function App() {
  const [imgEl,  setImgEl]  = useState(null);
  const [imgURL, setImgURL] = useState(null);
  const [rawText, setRawText] = useState('');
  const [parsed,  setParsed]  = useState(null);
  const [calib,   setCalib]   = useState({ topPx: 180, bottomPx: 900 });
  const [result,  setResult]  = useState(null);

  const loadBlob = useCallback((blob) => {
    if (!blob?.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        setImgEl(img);
        setImgURL(ev.target.result);
        setResult(null);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(blob);
  }, []);

  // Global Ctrl+V / Cmd+V paste
  useEffect(() => {
    const fn = (e) => {
      for (const item of Array.from(e.clipboardData?.items ?? [])) {
        if (item.type.startsWith('image/')) {
          loadBlob(item.getAsFile());
          e.preventDefault();
          return;
        }
      }
    };
    document.addEventListener('paste', fn);
    return () => document.removeEventListener('paste', fn);
  }, [loadBlob]);

  useEffect(() => {
    setParsed(rawText.trim() ? parseLines(rawText) : null);
  }, [rawText]);

  const handleClipboardBtn = async () => {
    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        for (const type of item.types) {
          if (type.startsWith('image/')) {
            loadBlob(await item.getType(type));
            return;
          }
        }
      }
      alert('クリップボードに画像がありません');
    } catch {
      alert('Ctrl+V / Cmd+V でページ上に画像を貼り付けてください');
    }
  };

  const handleDraw = () => {
    if (!imgEl || !parsed || parsed.error) return;
    setResult(renderToCanvas(imgEl, parsed, calib.topPx, calib.bottomPx));
    setTimeout(() => document.getElementById('res')?.scrollIntoView({ behavior: 'smooth' }), 100);
  };

  const handleReset = () => {
    setImgEl(null); setImgURL(null);
    setRawText(''); setParsed(null); setResult(null);
  };

  const canDraw = !!(imgEl && parsed && !parsed.error);
  const imgOk  = !!imgEl;
  const txtOk  = !!(parsed && !parsed.error);

  return (
    <div>
      <h1>BTC水平線ドロワー</h1>
      <p className="sub">プロジェクトで分析 → 画像と水平線データを貼り付けて描画</p>

      {/* Step 1: Image */}
      <StepCard num="1" title="チャート画像を選択" done={imgOk}>
        {!imgURL ? (
          <div>
            <label style={{ display:'block', border:'1.5px dashed rgba(255,255,255,0.18)', borderRadius:10, background:'#111', textAlign:'center', padding:'1.5rem 1rem', cursor:'pointer', position:'relative' }}>
              <input type="file" accept="image/*" style={{ position:'absolute', inset:0, opacity:0, width:'100%', height:'100%', cursor:'pointer' }} onChange={e => e.target.files[0] && loadBlob(e.target.files[0])}/>
              <div style={{ fontSize:28, marginBottom:6 }}>📊</div>
              <div style={{ fontSize:14, fontWeight:500, marginBottom:2 }}>タップして画像を選択</div>
              <div style={{ fontSize:12, color:'#555' }}>スクリーンショット・写真ライブラリから</div>
            </label>
            <div style={{ display:'flex', gap:8, marginTop:8 }}>
              <label style={PICK_BTN}>
                <input type="file" accept="image/*" style={{ position:'absolute', inset:0, opacity:0, width:'100%', height:'100%', cursor:'pointer' }} onChange={e => e.target.files[0] && loadBlob(e.target.files[0])}/>
                🖼 ライブラリ
              </label>
              <label style={PICK_BTN}>
                <input type="file" accept="image/*" capture="environment" style={{ position:'absolute', inset:0, opacity:0, width:'100%', height:'100%', cursor:'pointer' }} onChange={e => e.target.files[0] && loadBlob(e.target.files[0])}/>
                📷 カメラ
              </label>
              <button style={PICK_BTN} onClick={handleClipboardBtn}>📋 貼り付け</button>
            </div>
            <div style={{ fontSize:11, color:'#444', marginTop:6, textAlign:'center' }}>
              Ctrl+V / Cmd+V でも画像を貼り付けできます
            </div>
          </div>
        ) : (
          <div>
            <img src={imgURL} style={{ width:'100%', borderRadius:8, display:'block' }} alt="loaded"/>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:6 }}>
              <span className="ok-msg">✓ 画像を読み込みました</span>
              <button
                onClick={() => { setImgEl(null); setImgURL(null); setResult(null); }}
                style={{ background:'transparent', border:'0.5px solid rgba(255,255,255,0.15)', borderRadius:6, padding:'4px 10px', fontSize:11, color:'#555', cursor:'pointer' }}
              >変更</button>
            </div>
          </div>
        )}
      </StepCard>

      {/* Step 2: Data */}
      <StepCard num="2" title="水平線データを貼り付け" done={txtOk}>
        <div style={{ fontSize:11, color:'#444', marginBottom:6, lineHeight:1.6 }}>
          プロジェクトのClaudeが出力したテキストをそのまま貼り付け。<br/>
          形式: <span style={{ color:'#aaa', fontFamily:'monospace' }}>価格 | 強度 | 名前 | 色</span><br/>
          上端・下端も含めて貼ると自動参照されます。
        </div>
        <textarea
          className="paste-area"
          value={rawText}
          onChange={e => setRawText(e.target.value)}
          placeholder={"上端: 74707\n下端: 69800\n\n73238,73490 | 5.0 | 最重要レジスタンス | #FF4444\n73767 | 2.5 | 上レジスタンス | #FF8C42\n71416 | 3.5 | 中間ピボット | #FFD700"}
        />
        {parsed?.error && <div className="err">{parsed.error}</div>}
        {txtOk && (
          <div className="ok-msg">
            ✓ {parsed.lines.length}本の水平線を検出
            {parsed.priceTop    ? `、上端 ${parsed.priceTop}`    : ''}
            {parsed.priceBottom ? `、下端 ${parsed.priceBottom}` : ''}
          </div>
        )}
      </StepCard>

      {/* Step 3: Calibration (shown only when image is loaded) */}
      {imgURL && (
        <StepCard num="3" title="価格ラインの位置をドラッグで調整" done={false}>
          <CalibrationPanel
            key={imgURL}
            imageDataURL={imgURL}
            naturalHeight={imgEl?.naturalHeight ?? 1000}
            onChange={setCalib}
          />
          {parsed?.priceTop && (
            <div style={{ fontSize:11, color:'#555', marginTop:8, lineHeight:1.6 }}>
              緑ライン → 上端価格 <strong style={{ color:'#4CAF50' }}>{parsed.priceTop}</strong> が表示されている位置<br/>
              赤ライン → 下端価格 <strong style={{ color:'#FF4444' }}>{parsed.priceBottom ?? '(データから推定)'}</strong> が表示されている位置
            </div>
          )}
        </StepCard>
      )}

      <button className="btn-main" disabled={!canDraw} onClick={handleDraw}>
        水平線を描画する
      </button>

      {/* Result */}
      {result && (
        <div id="res">
          <div style={{ borderRadius:12, overflow:'hidden', border:'0.5px solid rgba(255,255,255,0.1)', marginBottom:10 }}>
            <img src={result.dataURL} style={{ width:'100%', display:'block' }} alt="result"/>
          </div>
          <button className="btn-dl" onClick={() => {
            const a = document.createElement('a');
            a.download = 'btc_chart.png';
            a.href = result.dataURL;
            a.click();
          }}>📥 画像をダウンロード</button>

          {result.legend.length > 0 && (
            <div className="legend" style={{ marginTop:8 }}>
              <div className="leg-t">凡例</div>
              {result.legend.map((l, i) => (
                <div key={i} className="leg-row">
                  <div style={{ paddingTop:4, flexShrink:0 }}>
                    <div style={{ width:26, height:l.isZone ? 12 : 2, background:l.col, borderRadius:2, marginTop:l.isZone ? 0 : 4 }}/>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:500, color:'#f0f0f0' }}>
                      {l.price} <span style={{ color:'#555', fontSize:11 }}>{l.score}/5</span>
                    </div>
                    <div style={{ fontSize:11, color:'#444' }}>{l.name}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <button className="btn-sub" onClick={handleReset}>リセット</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
